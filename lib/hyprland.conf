-- Lua source read into Home Manager's generated hyprland.lua.
local mod = "SUPER"

hl.config({
  general = {
    gaps_in = 0,
    gaps_out = 0,
  },
  misc = {
    disable_hyprland_logo = true,
  },
})

hl.bind(mod .. " + F", hl.dsp.window.fullscreen())
hl.bind(mod .. " + RETURN", hl.dsp.exec_cmd("kitty"))
-- hl.bind(mod .. " + L", hl.dsp.exec_cmd("hyprctl keyword input:kb_layout dk"))
hl.bind(mod .. " + SHIFT + Q", hl.dsp.window.kill())
hl.bind(mod .. " + SHIFT + S", hl.dsp.exec_cmd("slurp | grim -g - - | wl-copy -t image/png"))

hl.bind(mod .. " + right", hl.dsp.focus({ direction = "right" }))
hl.bind(mod .. " + left", hl.dsp.focus({ direction = "left" }))
hl.bind(mod .. " + up", hl.dsp.focus({ direction = "up" }))
hl.bind(mod .. " + down", hl.dsp.focus({ direction = "down" }))

hl.bind(mod .. " + l", hl.dsp.focus({ direction = "right" }))
hl.bind(mod .. " + h", hl.dsp.focus({ direction = "left" }))
hl.bind(mod .. " + k", hl.dsp.focus({ direction = "up" }))
hl.bind(mod .. " + j", hl.dsp.focus({ direction = "down" }))

hl.bind(mod .. " + SHIFT + right", hl.dsp.window.move({ direction = "right" }))
hl.bind(mod .. " + SHIFT + left", hl.dsp.window.move({ direction = "left" }))
hl.bind(mod .. " + SHIFT + up", hl.dsp.window.move({ direction = "up" }))
hl.bind(mod .. " + SHIFT + down", hl.dsp.window.move({ direction = "down" }))

hl.bind(mod .. " + SHIFT + CTRL + right", hl.dsp.workspace.move({ monitor = "r" }))
hl.bind(mod .. " + SHIFT + CTRL + left", hl.dsp.workspace.move({ monitor = "l" }))
hl.bind(mod .. " + SHIFT + CTRL + up", hl.dsp.focus({ workspace = "m+1" }))
