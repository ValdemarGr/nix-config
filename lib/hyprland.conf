hl.bind(mod .. " + 0", hl.dsp.focus({ workspace = "0" }))
hl.bind(mod .. " + 1", hl.dsp.focus({ workspace = "1" }))
hl.bind(mod .. " + 2", hl.dsp.focus({ workspace = "2" }))
